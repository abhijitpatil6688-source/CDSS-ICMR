substitutions:
  _REGION: asia-south1          # Mumbai — closest to India
  _REPO: cdss-icmr              # Artifact Registry repository name
  _BACKEND_SERVICE: cdss-icmr-api
  _FRONTEND_SERVICE: cdss-icmr-frontend

steps:
  # ── BACKEND ────────────────────────────────────────────────────────────────

  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - ./backend

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend
    waitFor: [build-backend]

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=GUIDELINES_DIR=guidelines/radiology,DEBUG=false
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,SECRET_KEY=CDSS_SECRET_KEY:latest
    waitFor: [push-backend]

  # ── FRONTEND ───────────────────────────────────────────────────────────────

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest
      - --build-arg
      - VITE_API_BASE_URL=https://${_BACKEND_SERVICE}-${_REGION}-$PROJECT_NUMBER.a.run.app/api/v1
      - ./web
    waitFor: ['-']   # runs in parallel with backend build

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend
    waitFor: [build-frontend]

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
    waitFor: [push-frontend]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
