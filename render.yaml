services:
  - type: web
    name: cdss-icmr-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: GUIDELINES_DIR
        value: guidelines/radiology
