services:
  - type: web
    name: cdss-icmr-api
    env: python
    region: singapore          # Closest to India
    plan: free                 # Upgrade to 'starter' ($7/mo) for no sleep
    rootDir: backend
        buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false            # You set this manually in the Render dashboard
      - key: SECRET_KEY
        generateValue: true    # Render generates a secure random value
      - key: DEBUG
        value: "false"
      - key: GUIDELINES_DIR
        value: guidelines/radiology
